<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InsuFlow | CI Pro Experience</title>
    
    <style>
        /* ============================================================
           GLOBAL NAV (inline since global-nav.css is external)
           ============================================================ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --nav-height: 52px;
            --accent: #0071e3;
            --bg: #f5f5f7;
            --surface: #ffffff;
            --text-primary: #1d1d1f;
            --text-secondary: #515154;
            --text-tertiary: #86868b;
            --border: rgba(0, 0, 0, 0.06);
            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-sm: 8px;
        }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* ---- Navbar ---- */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            height: var(--nav-height);
        }

        .nav-container {
            max-width: 940px;
            margin: 0 auto;
            padding: 0 24px;
            height: 100%;
            display: flex;
            align-items: center;
            gap: 32px;
        }

        .logo {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
            cursor: pointer;
            letter-spacing: -0.02em;
            flex-shrink: 0;
        }

        .nav-menu {
            display: flex;
            gap: 4px;
            align-items: center;
            margin-left: auto;
        }

        .nav-item {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 8px;
            transition: background 0.15s, color 0.15s;
            white-space: nowrap;
        }

        .nav-item:hover { background: rgba(0,0,0,0.05); color: var(--text-primary); }
        .nav-item.active { background: rgba(0,113,227,0.08); color: var(--accent); }

        /* Mobile hamburger */
        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            margin-left: auto;
            padding: 6px;
        }

        .menu-toggle span {
            display: block;
            width: 22px;
            height: 2px;
            background: var(--text-primary);
            border-radius: 2px;
            transition: 0.3s;
        }

        @media (max-width: 700px) {
            .menu-toggle { display: flex; }
            .nav-menu {
                display: none;
                position: absolute;
                top: var(--nav-height);
                left: 0; right: 0;
                background: rgba(255,255,255,0.97);
                backdrop-filter: blur(20px);
                flex-direction: column;
                padding: 12px 16px 20px;
                gap: 2px;
                border-bottom: 1px solid var(--border);
            }
            .nav-menu.show { display: flex; }
            .nav-item { width: 100%; padding: 10px 14px; }
        }

        /* ============================================================
           WORKSPACE
           ============================================================ */
        .workspace-container {
            max-width: 940px;
            margin: 40px auto;
            padding: 0 24px 100px;
        }

        /* ---- Stage Card ---- */
        .stage-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.04);
            box-shadow: 0 4px 24px rgba(0,0,0,0.05);
            margin-bottom: 28px;
        }

        .video-player-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: #000;
        }

        .video-player-wrapper iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .stage-info { padding: 28px 32px; }

        .meta-strip {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .source-badge {
            display: inline-flex;
            align-items: center;
            font-size: 12px;
            font-weight: 500;
            color: var(--accent);
            background: #f0f7ff;
            padding: 4px 10px;
            border-radius: 6px;
        }

        .stage-info h1 {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.015em;
            margin-bottom: 8px;
            line-height: 1.35;
        }

        .stage-info p {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* ---- Filter Panel ---- */
       .filter-navigation {
    background: var(--surface);
    padding: 20px 24px;
    border-radius: 16px;
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-bottom: 24px;
    overflow: hidden; /* ← add this */
    width: 100%;      /* ← add this */
}


    .filter-row {
    display: flex;
    align-items: center;
    gap: 16px;
    width: 100%;
    overflow: hidden; /* ← add this */
}


        .filter-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            min-width: 85px;
            flex-shrink: 0;
        }

        .tab-scroll-container {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 2px;
    scrollbar-width: none;
    flex-grow: 1;
    min-width: 0; /* ← add this line */
}

        .tab-scroll-container::-webkit-scrollbar { display: none; }

        .filter-tab {
            background: rgba(0,0,0,0.04);
            border: none;
            color: var(--text-secondary);
            padding: 7px 14px;
            font-size: 13px;
            font-weight: 500;
            border-radius: 999px;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s, color 0.2s;
        }

        .filter-tab:hover { background: rgba(0,0,0,0.08); color: var(--text-primary); }
        .filter-tab.active { background: var(--text-primary); color: #fff; }

        /* ---- Playlist Grid ---- */
        .playlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 14px;
        }

        .playlist-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 18px 20px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 4px;
            transition: transform 0.2s cubic-bezier(0.25,1,0.5,1), border-color 0.2s, background 0.2s;
        }

        .playlist-card:hover {
            background: var(--bg);
            border-color: #d2d2d7;
            transform: translateY(-2px);
        }

        .playlist-card.active {
            background: #f0f7ff;
            border-color: var(--accent);
            box-shadow: inset 0 0 0 1px var(--accent);
        }

        .video-tag {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .playlist-card h3 {
            font-size: 13.5px;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.45;
            margin: 4px 0;
        }

        .card-source {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-top: auto;
            padding-top: 6px;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 48px 20px;
            color: var(--text-tertiary);
            font-size: 14px;
            background: var(--surface);
            border-radius: var(--radius-md);
            border: 1px dashed #d2d2d7;
        }

        /* ---- Floating Status Bar ---- */
        .floating-status-bar {
            position: fixed;
            bottom: -90px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.88);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0,0,0,0.08);
            padding: 12px 20px;
            border-radius: 999px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.10);
            width: calc(100% - 48px);
            max-width: 500px;
            z-index: 9999;
            cursor: pointer;
            transition: bottom 0.4s cubic-bezier(0.25,1,0.5,1);
        }

        .floating-status-bar.visible { bottom: 24px; }

        .floating-status-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: #34c759;
            border-radius: 50%;
            flex-shrink: 0;
            animation: pulseActive 2s infinite;
        }

        @keyframes pulseActive {
            0%   { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(52,199,89,0.5); }
            70%  { transform: scale(1);    box-shadow: 0 0 0 8px rgba(52,199,89,0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(52,199,89,0); }
        }

        .status-text-wrapper {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-grow: 1;
        }

        .status-label {
            font-size: 9px;
            font-weight: 700;
            color: var(--text-tertiary);
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .status-title {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .status-action-arrow {
            font-size: 12px;
            font-weight: 600;
            color: var(--accent);
            white-space: nowrap;
            padding-left: 12px;
            border-left: 1px solid rgba(0,0,0,0.1);
        }

        /* ---- Responsive ---- */
        @media (max-width: 768px) {
            .stage-info { padding: 18px 20px; }
            .stage-info h1 { font-size: 18px; }
            .workspace-container { margin-top: 24px; padding: 0 16px 80px; }
            .filter-row { flex-direction: column; align-items: flex-start; gap: 8px; }
            .filter-label { min-width: unset; }
        }
    </style>
</head>
<body>

    <!-- ============================
         NAVIGATION
         ============================ -->
    <header class="navbar">
        <div class="nav-container">
            <span class="logo" onclick="window.location.href='dashboard.html'">InsuFlow Hub</span>

            <div class="menu-toggle" onclick="toggleMobileMenu()" aria-label="Toggle menu">
                <span></span><span></span><span></span>
            </div>

            <nav class="nav-menu" id="navMenu">
                <a href="dashboard.html" class="nav-item">Operational Hub</a>
                <a href="ci-pro-experience.html" class="nav-item active">CI Pro Experience</a>
                <a href="app-filler.html" class="nav-item">1-to-3 Form Filler</a>
                <a href="app-nomination.html" class="nav-item">Nomination Tool</a>
            </nav>
        </div>
    </header>

    <!-- ============================
         MAIN WORKSPACE
         ============================ -->
    <main class="workspace-container">

        <!-- Video Stage -->
        <div class="stage-card">
            <div class="video-player-wrapper" id="videoWrapperContainer"></div>
            <div class="stage-info">
                <div class="meta-strip">
                    <span id="videoSourceBadge" class="source-badge">Loading...</span>
                </div>
                <h1 id="videoTitle">Loading Session Title...</h1>
                <p id="videoDescription">Loading description...</p>
            </div>
        </div>

        <!-- Filter Panel -->
        <div class="filter-navigation">
            <div class="filter-row">
                <span class="filter-label">Language:</span>
                <div class="tab-scroll-container" id="languageFilterGroup">
                    <button class="filter-tab active" onclick="setLanguageFilter('all')">All Languages</button>
                    <button class="filter-tab" onclick="setLanguageFilter('english')">English</button>
                    <button class="filter-tab" onclick="setLanguageFilter('chinese')">中文</button>
                </div>
            </div>
            <div class="filter-row">
                <span class="filter-label">Condition:</span>
                <div class="tab-scroll-container" id="illnessFilterGroup">
                    <button class="filter-tab active" onclick="setIllnessFilter('all')">All Conditions</button>
                    <button class="filter-tab" onclick="setIllnessFilter('cancer')">Cancer</button>
                    <button class="filter-tab" onclick="setIllnessFilter('heart attack')">Heart Attack</button>
                    <button class="filter-tab" onclick="setIllnessFilter('dementia')">Dementia</button>
                    <button class="filter-tab" onclick="setIllnessFilter('general')">Medical Tech / General</button>
                </div>
            </div>
        </div>

        <!-- Playlist Grid -->
        <div class="playlist-grid" id="playlistItemsGrid"></div>

        <!-- Floating Status Bar -->
        <div id="floatingStatusTracker" class="floating-status-bar" onclick="scrollToVideoPlayer()">
            <div class="floating-status-content">
                <span class="pulse-dot"></span>
                <div class="status-text-wrapper">
                    <span class="status-label">Now Playing</span>
                    <span id="floatingVideoTitle" class="status-title">Loading...</span>
                </div>
                <span class="status-action-arrow">↑ Jump to Player</span>
            </div>
        </div>

    </main>

    <script>
        // ============================================================
        // DATA
        // ============================================================
        const playlistData = [
            {
                id: 0,
                title: "Millennials Fighting Stage 4 Cancer: How We Found Out | Part 1/3",
                description: "They're under 45, fit, and thriving in their careers—until cancer turns their worlds upside down.",
                language: "english",
                illness: "cancer",
                category: "English - Survivor's Stories",
                youtubeId: "Xwd-OdVXvx8"
            },
            {
                id: 1,
                title: "Millennials Fighting Stage 4 Cancer: Our New Life Goals | Part 2/3",
                description: "The three young patients need to adapt as the disease continues to shift their realities.",
                language: "english",
                illness: "cancer",
                category: "English - Survivor's Stories",
                youtubeId: "AOr9IKhkxac"
            },
            {
                id: 2,
                title: "Millennials Fighting Stage 4 Cancer: Will We Survive? | Part 3/3",
                description: "What does the future hold for these resilient young cancer patients? Can they overcome the odds and triumph over this relentless disease?",
                language: "english",
                illness: "cancer",
                category: "English - Survivor's Stories",
                youtubeId: "GvK6TYmFwjo"
            },
            {
                id: 3,
                title: "3个90后患癌后如何面对的故事",
                description: "90后患淋巴癌隐瞒家人拍片全记录网上分享 | 29岁女患罕见癌症 | 23岁女确診乳癌",
                language: "chinese",
                illness: "cancer",
                category: "Chinese - 疾病后的人生",
                youtubeId: "UucwRL50bhc"
            },
            {
                id: 4,
                title: "我43岁，不烟不酒，却得肺腺癌",
                description: "I HAVE CANCER（从健检、确诊、手术到重生的真实纪录)",
                language: "chinese",
                illness: "cancer",
                category: "Chinese - 疾病后的人生",
                youtubeId: "3ThVkBKZZMY"
            },
            {
                id: 5,
                title: "How does cancer spread through the body?",
                description: "Cancer usually begins with one tumor in a specific area of the body. But if the tumor is not removed, cancer has the ability to spread to nearby organs as well as places far away from the origin, like the brain.",
                language: "english",
                illness: "cancer",
                category: "English - Educational",
                youtubeId: "OcigJn8UJNQ"
            },
            {
                id: 6,
                title: "What Brain Cancer Taught Me About Critical Illness & Long-Term Planning Care",
                description: "34-year-old Edwin Gan was diagnosed with an aggressive brain tumour two years ago. Financial planning helped cover the burden of his $350,000 hospital bills.",
                language: "english",
                illness: "cancer",
                category: "English - Survivor's Stories",
                youtubeId: "yVPWhNvpMAI"
            },
            {
                id: 7,
                title: "How does chemotherapy work? - Hyunsoo Joshua No",
                description: "Discover how chemotherapy drugs use cytotoxic agents to attack cancer cells and the impact they have on your body.",
                language: "english",
                illness: "cancer",
                category: "English - Educational",
                youtubeId: "RgWQCGX3MOk"
            },
            {
                id: 8,
                title: "How AI is finding cancer treatments with fewer side-effects | BBC News",
                description: "Many cancer treatments can be harsh on patients and not all are successful despite huge progress made by researchers and scientists.",
                language: "english",
                illness: "general",
                category: "English - Technology of Hope",
                youtubeId: "FtdXAZ048hA"
            },
            {
                id: 9,
                title: "Why More Young People Are Getting Cancer | Business Insider Explains",
                description: "More people, from their teens to young adults, are getting cancer than ever before, leaving researchers scrambling for clues.",
                language: "english",
                illness: "cancer",
                category: "English - Educational",
                youtubeId: "YQZxWtJfYCM"
            }
        ];

        // ============================================================
        // STATE
        // ============================================================
        let currentActiveId = 0;
        let currentLanguageFilter = 'all';
        let currentIllnessFilter = 'all';

        // ============================================================
        // PLAYER
        // ============================================================
        function updateStagePlayer(id) {
            currentActiveId = id;
            const item = playlistData.find(v => v.id === id);
            if (!item) return;

            // Update iframe
            document.getElementById('videoWrapperContainer').innerHTML = `
                <iframe
                    src="https://www.youtube.com/embed/${item.youtubeId}?rel=0&autoplay=0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen>
                </iframe>`;

            // Update stage info
            document.getElementById('videoTitle').textContent       = item.title;
            document.getElementById('videoDescription').textContent = item.description;
            document.getElementById('videoSourceBadge').textContent = item.category;

            // Update floating bar title
            document.getElementById('floatingVideoTitle').textContent = item.title;

            // Refresh active state on cards
            document.querySelectorAll('.playlist-card').forEach(card => {
                card.classList.toggle('active', parseInt(card.dataset.id) === id);
            });
        }

        // ============================================================
        // FILTERS
        // ============================================================
        function setLanguageFilter(lang) {
            currentLanguageFilter = lang;
            updateTabVisuals('languageFilterGroup', lang);
            applyCombinedFilters();
        }

        function setIllnessFilter(illness) {
            currentIllnessFilter = illness;
            updateTabVisuals('illnessFilterGroup', illness);
            applyCombinedFilters();
        }

        function updateTabVisuals(containerId, selectedValue) {
            document.querySelectorAll(`#${containerId} .filter-tab`).forEach(tab => {
                // Match by extracting the argument from the onclick string
                const match = tab.getAttribute('onclick').match(/'([^']+)'/);
                tab.classList.toggle('active', match && match[1] === selectedValue);
            });
        }

        function applyCombinedFilters() {
            const grid = document.getElementById('playlistItemsGrid');
            grid.innerHTML = '';

            const filtered = playlistData.filter(item => {
                const langOk    = currentLanguageFilter === 'all' || item.language === currentLanguageFilter;
                const illnessOk = currentIllnessFilter  === 'all' || item.illness  === currentIllnessFilter;
                return langOk && illnessOk;
            });

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="empty-state">No videos found for this combination.<br>Try a different filter.</div>`;
                return;
            }

            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = `playlist-card${item.id === currentActiveId ? ' active' : ''}`;
                card.dataset.id = item.id;
                card.innerHTML = `
                    <span class="video-tag">${item.language.toUpperCase()} • ${item.illness.toUpperCase()}</span>
                    <h3>${item.title}</h3>
                    <span class="card-source">📺 Click to View</span>`;
                card.addEventListener('click', () => updateStagePlayer(item.id));
                grid.appendChild(card);
            });

            // If the currently playing video is not in the filtered set, auto-play the first result
            if (!filtered.some(item => item.id === currentActiveId)) {
                updateStagePlayer(filtered[0].id);
            }
        }

        // ============================================================
        // FLOATING BAR — scroll visibility
        // ============================================================
        function scrollToVideoPlayer() {
            document.getElementById('videoWrapperContainer')
                .scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        window.addEventListener('scroll', () => {
            const playerBounds = document.getElementById('videoWrapperContainer').getBoundingClientRect();
            const bar = document.getElementById('floatingStatusTracker');
            bar.classList.toggle('visible', playerBounds.bottom < 0);
        });

        // ============================================================
        // MOBILE NAV
        // ============================================================
        function toggleMobileMenu() {
            document.getElementById('navMenu').classList.toggle('show');
        }

        // ============================================================
        // INIT
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            applyCombinedFilters();
            updateStagePlayer(0);
        });
    </script>
</body>
</html>
