<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InsuFlow | CI Pro Experience</title>
    
    <!-- Shared global navigation style link -->
    <link rel="stylesheet" href="global-nav.css">

    <style>
        /* Modern Apple Aesthetic Layout Styles */
        body {
            background-color: #f5f5f7;
            color: #1d1d1f;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .workspace-container {
            max-width: 940px;
            margin: 40px auto;
            padding: 0 24px 80px 24px;
        }

        /* Video Showcase Stage */
        .stage-card {
            background: #ffffff;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.04);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.02);
            margin-bottom: 32px;
        }

        .video-player-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            background-color: #000000;
        }

        .video-player-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .stage-info {
            padding: 28px 32px;
        }

        .stage-info h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.015em;
            margin-bottom: 6px;
            color: #1d1d1f;
        }

        .meta-strip {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .source-badge {
            display: inline-flex;
            align-items: center;
            font-size: 12px;
            font-weight: 500;
            color: #0071e3;
            background-color: #f5f5f7;
            padding: 4px 10px;
            border-radius: 6px;
        }

        .stage-info p {
            font-size: 15px;
            color: #515154;
            line-height: 1.6;
        }

        /* Apple Style Segmented Filter Tabs */
        .filter-navigation {
            margin-bottom: 20px;
        }

        .tab-scroll-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 8px;
            scrollbar-width: none; /* Hide for Firefox */
        }
        .tab-scroll-container::-webkit-scrollbar { display: none; } /* Hide for Chrome/Safari */

        .filter-tab {
            background: rgba(0, 0, 0, 0.04);
            border: none;
            color: #515154;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 500;
            border-radius: 999px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        .filter-tab:hover {
            background: rgba(0, 0, 0, 0.08);
            color: #000000;
        }

        .filter-tab.active {
            background: #1d1d1f;
            color: #ffffff;
        }

           /* Thumbnail Playlist Section */
        .playlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 16px;
        }

        .playlist-card {
            background: #ffffff;
            border: 1px solid rgba(0, 0, 0, 0.06);
            border-radius: 14px;
            padding: 20px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 6px;
            transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .playlist-card:hover {
            background-color: #f5f5f7;
            border-color: #d2d2d7;
            transform: translateY(-1px);
        }

        .playlist-card.active {
            background-color: #f5f5f7;
            border-color: #0071e3;
            box-shadow: inset 0 0 0 1px #0071e3;
        }

        .playlist-card .video-tag {
            font-size: 11px;
            font-weight: 600;
            color: #86868b;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .playlist-card h3 {
            font-size: 14px;
            font-weight: 600;
            color: #1d1d1f;
            line-height: 1.4;
            margin: 4px 0;
        }

        .playlist-card .card-source {
            font-size: 12px;
            color: #86868b;
            margin-top: auto;
            padding-top: 4px;
        }

        /* ==========================================================================
           FLOATING STATUS BAR (Moved Outside Media Query for Universal Desktop/Mobile Support)
           ========================================================================== */
        .floating-status-bar {
            position: fixed;
            bottom: -80px; /* Hidden below screen by default */
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 0, 0, 0.08);
            padding: 12px 20px;
            border-radius: 999px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            width: calc(100% - 48px);
            max-width: 500px;
            z-index: 9999;
            cursor: pointer;
            transition: bottom 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .floating-status-bar.visible {
            bottom: 24px; /* Slides up smoothly into view */
        }

        .floating-status-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Mini recording/playing status pulse indicator */
        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: #34c759; /* Apple Green */
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(52, 199, 89, 0.4);
            animation: pulseActive 2s infinite;
            flex-shrink: 0;
        }

        @keyframes pulseActive {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(52, 199, 89, 0.5); }
            70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(52, 199, 89, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(52, 199, 89, 0); }
        }

        .status-text-wrapper {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-grow: 1;
        }

        .floating-status-bar .status-label {
            font-size: 9px;
            font-weight: 700;
            color: #86868b;
            letter-spacing: 0.05em;
        }

        .floating-status-bar .status-title {
            font-size: 13px;
            font-weight: 500;
            color: #1d1d1f;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .status-action-arrow {
            font-size: 12px;
            font-weight: 600;
            color: #0071e3;
            white-space: nowrap;
            padding-left: 8px;
            border-left: 1px solid rgba(0, 0, 0, 0.1);
        }

                /* Multi-Criteria Filter Dashboard Styling */
        .filter-navigation {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 24px;
        }

        .filter-row {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .filter-label {
            font-size: 11px;
            font-weight: 700;
            color: #86868b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            min-width: 85px;
            flex-shrink: 0;
        }

        .filter-row .tab-scroll-container {
            margin-bottom: 0;
            padding-bottom: 0;
            flex-grow: 1;
        }

        @media (max-width: 640px) {
            .filter-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 6px;
            }
            .filter-label {
                min-width: unset;
            }
        }

        /* Responsive Mobile Variations */
        @media (max-width: 768px) {
            .stage-info { padding: 20px; }
            .stage-info h1 { font-size: 20px; }
            .workspace-container { padding: 0 16px 60px 16px; }
        }
    </style>
</head>
<body>

    <!-- Universal Top Navigation Row -->
    <header class="navbar">
        <div class="nav-container">
            <span class="logo" onclick="window.location.href='dashboard.html'">InsuFlow Hub</span>
            
            <div class="menu-toggle" onclick="toggleMobileMenu()">
                <span></span><span></span><span></span>
            </div>

            <nav class="nav-menu" id="navMenu">
                <a href="dashboard.html" class="nav-item">Operational Hub</a>
                <a href="ci-pro-experience.html" class="nav-item active">CI Pro Experience</a>
                <a href="app-filler.html" class="nav-item">1-to-3 Form Filler</a>
                <a href="app-nomination.html" class="nav-item">Nomination Tool</a>
            </nav>
        </div>
    </header>

    <!-- Workspace Content Layout Display Stage -->
    <main class="workspace-container">
        
        <div class="stage-card">
            <div class="video-player-wrapper" id="videoWrapperContainer">
                <!-- Video player maps dynamically here -->
            </div>
            
            <div class="stage-info">
                <div class="meta-strip">
                    <span id="videoSourceBadge" class="source-badge">Loading...</span>
                </div>
                <h1 id="videoTitle">Loading Session Title...</h1>
                <p id="videoDescription">Loading dynamic system explanation descriptions...</p>
            </div>
        </div>

                <!-- Segmented Multi-Criteria Filters -->
        <div class="filter-navigation">
            <!-- Row 1: Language Selection -->
            <div class="filter-row">
                <span class="filter-label">Language:</span>
                <div class="tab-scroll-container" id="languageFilterGroup">
                    <button class="filter-tab active" onclick="setLanguageFilter('all')">All Languages</button>
                    <button class="filter-tab" onclick="setLanguageFilter('english')">English</button>
                    <button class="filter-tab" onclick="setLanguageFilter('chinese')">中文</button>
                </div>
            </div>

            <!-- Row 2: Critical Illness Type Selection -->
            <div class="filter-row">
                <span class="filter-label">Condition:</span>
                <div class="tab-scroll-container" id="illnessFilterGroup">
                    <button class="filter-tab active" onclick="setIllnessFilter('all')">All Conditions</button>
                    <button class="filter-tab" onclick="setIllnessFilter('cancer')">Cancer</button>
                    <button class="filter-tab" onclick="setIllnessFilter('heart attack')">Heart Attack</button>
                    <button class="filter-tab" onclick="setIllnessFilter('dementia')">Dementia</button>
                    <button class="filter-tab" onclick="setIllnessFilter('general')">Medical Tech / General</button>
                </div>
            </div>
        </div>

        <!-- Filtered Grid -->
        <div class="playlist-grid" id="playlistItemsGrid"></div>

        <!-- Smart Sticky Float Indicator -->
<div id="floatingStatusTracker" class="floating-status-bar" onclick="scrollToVideoPlayer()">
    <div class="floating-status-content">
        <span class="pulse-dot"></span>
        <div class="status-text-wrapper">
            <span class="status-label">NOW COATING ACTION</span>
            <span id="floatingVideoTitle" class="status-title">Loading...</span>
        </div>
        <span class="status-action-arrow">↑ Jump to Player</span>
    </div>
</div>

    </main>

    <script>
        function toggleMobileMenu() {
            document.getElementById('navMenu').classList.toggle('show');
        }

        // MASTER CATEGORIZED VIDEO DATA (Updated with explicit Language and Illness filters)
        const playlistData = [
            {
                id: 0,

            {

                language: "english",

                youtubeId: "AOr9IKhkxac"
            },
            {
                id: 2,
                title: "Millennials Fighting Stage 4 Cancer: Will We Survive? | Part 3/3",
                description: "What does the future hold for these resilient young cancer patients? Can they overcome the odds and triumph over this relentless disease?",
                language: "english",

                youtubeId: "GvK6TYmFwjo",
            },
            {
                id: 3,

                description: "90后患淋巴癌隐瞒家人拍片全记录网上分享 | 29岁女患罕见癌症 | 23岁女确診乳癌",
                language: "chinese",
                illness: "cancer",
                category: "Chinese - 疾病后的人生",
                youtubeId: "UucwRL50bhc"
            },
            {
                id: 4,
                title: "我43岁，不烟不酒，却得肺腺癌",
                description: "I HAVE CANCER（从健检、确诊、手术到重生的真实纪录)",
                language: "chinese",
                illness: "cancer",
                category: "Chinese - 疾病后的人生",
                youtubeId: "3ThVkBKZZMY"
            },
            {
                id: 5,
                title: "How does cancer spread through the body?",
                description: "Cancer usually begins with one tumor in a specific area of the body. But if the tumor is not removed, cancer has the ability to spread to nearby organs as well as places far away from the origin, like the brain.",
                language: "english",
                illness: "cancer",
                category: "English - Educational",
                youtubeId: "OcigJn8UJNQ"
            },
            {
                id: 6,
                title: "What Brain Cancer Taught Me About Critical Illness & Long-Term Planning Care",
                description: "34-year-old Edwin Gan was diagnosed with an aggressive brain tumour two years ago. Financial planning helped cover the burden of his $350,000 hospital bills.",
                language: "english",
                illness: "cancer",
                category: "English - Survivor’s Stories",
                youtubeId: "yVPWhNvpMAI"
            },
            {
                id: 7,
                title: "How does chemotherapy work? - Hyunsoo Joshua No",
                description: "Discover how chemotherapy drugs use cytotoxic agents to attack cancer cells and the impact they have on your body.",
                language: "english",
                illness: "cancer",
                category: "English - Educational",
                youtubeId: "RgWQCGX3MOk"
            },
            {
                id: 8,
                title: "How AI is finding cancer treatments with fewer side-effects | BBC News",
                description: "Many cancer treatments can be harsh on patients and not all are successful despite huge progress made by researchers and scientists.",
                language: "english",
                illness: "general",
                category: "English - Technology of Hope",
                youtubeId: "FtdXAZ048hA"
            },
            {
                id: 9,
                title: "Why More Young People Are Getting Cancer | Business Insider Explains | Insider News",
                description: "More people, from their teens to young adults, are getting cancer than ever before, leaving researchers scrambling for clues.",
                language: "english",
                illness: "cancer",
                category: "English - Educational",
                youtubeId: "YQZxWtJfYCM"
            }
        ];

        let currentActiveId = 0;
        let currentFilter = 'all';

        // Stage updater engine
        function updateStagePlayer(id) {
            currentActiveId = id;
            const dataItem = playlistData.find(item => item.id === id);
            const playerWrapper = document.getElementById('videoWrapperContainer');
            const cleanId = dataItem.youtubeId.toString().trim();

            playerWrapper.innerHTML = `
                <iframe 
                    src="https://www.youtube.com/embed/${cleanId}?rel=0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
                </iframe>
            `;
            
            document.getElementById('videoTitle').innerText = dataItem.title;
            document.getElementById('videoDescription').innerText = dataItem.description;
            document.getElementById('videoSourceBadge').innerText = dataItem.category;

            // Highlight chosen item card inside UI list
            document.querySelectorAll('.playlist-card').forEach(card => {
                if (parseInt(card.getAttribute('data-id')) === id) {
                    card.classList.add('active');
                } else {
                    card.classList.remove('active');
                }
            });
        }

           // Tracking states for filters
        let currentLanguageFilter = 'all';
        let currentIllnessFilter = 'all';

        function setLanguageFilter(lang) {
            currentLanguageFilter = lang;
            updateTabVisuals('languageFilterGroup', lang);
            applyCombinedFilters();
        }

        function setIllnessFilter(illnessType) {
            currentIllnessFilter = illnessType;
            updateTabVisuals('illnessFilterGroup', illnessType);
            applyCombinedFilters();
        }

        // Toggles active CSS class states across specific button groups
        function updateTabVisuals(containerId, value) {
            const container = document.getElementById(containerId);
            const tabs = container.querySelectorAll('.filter-tab');
            tabs.forEach(tab => {
                if(tab.getAttribute('onclick').includes(`'${value}'`)) {
                    tab.classList.add('active');
                } else {
                    tab.classList.remove('active');
                }
            });
        }

        // Unified rendering engine evaluating multi-level filter queries
        function applyCombinedFilters() {
            const listGrid = document.getElementById('playlistItemsGrid');
            listGrid.innerHTML = ''; 

            // Filter data checking both parameters sequentially
            const filteredData = playlistData.filter(item => {
                const matchesLanguage = (currentLanguageFilter === 'all' || item.language === currentLanguageFilter);
                const matchesIllness = (currentIllnessFilter === 'all' || item.illness === currentIllnessFilter);
                return matchesLanguage && matchesIllness;
            });

            // Populate items grid matching filter arrays
            filteredData.forEach((item) => {
                const cardElement = document.createElement('div');
                cardElement.className = `playlist-card ${item.id === currentActiveId ? 'active' : ''}`;
                cardElement.setAttribute('data-id', item.id);
                cardElement.setAttribute('onclick', `updateStagePlayer(${item.id})`);

                // Generate clean modern tag display combining properties
                const visualTag = `${item.language.toUpperCase()} • ${item.illness.toUpperCase()}`;

                cardElement.innerHTML = `
                    <span class="video-tag">${visualTag}</span>
                    <h3>${item.title}</h3>
                    <span class="card-source">📺 Click to View</span>
                `;
                listGrid.appendChild(cardElement);
            });

            // Empty state fallback visual block
            if (filteredData.length === 0) {
                listGrid.innerHTML = `
                    <div style="grid-column: 1 / -1; text-align: center; padding: 40px 20px; color: #86868b; font-size: 14px;">
                        No video modules found matching the chosen combination.
                    </div>`;
            } else if (!filteredData.some(item => item.id === currentActiveId)) {
                // Smoothly update player stage onto first match option if active item is out of view bounds
                updateStagePlayer(filteredData[0].id);
            }
        }

            // Rebuild Grid List Interface
            const listGrid = document.getElementById('playlistItemsGrid');
            listGrid.innerHTML = ''; 

            const filteredData = playlistData.filter(item => categoryTag === 'all' || item.category === categoryTag);

            filteredData.forEach((item) => {
                const cardElement = document.createElement('div');
                cardElement.className = `playlist-card ${item.id === currentActiveId ? 'active' : ''}`;
                cardElement.setAttribute('data-id', item.id);
                cardElement.setAttribute('onclick', `updateStagePlayer(${item.id})`);

                cardElement.innerHTML = `
                    <span class="video-tag">${item.category}</span>
                    <h3>${item.title}</h3>
                    <span class="card-source">📺 Click to View</span>
                `;
                listGrid.appendChild(cardElement);
            });

            // If the filtered array leaves out our currently selected main player video, automatically switch player to first available video in the view array
            if(filteredData.length > 0 && !filteredData.some(item => item.id === currentActiveId)) {
                updateStagePlayer(filteredData[0].id);
            }
        }

            // Initialize script logic processing 
        document.addEventListener("DOMContentLoaded", function() {
            applyCombinedFilters(); // Build initial grid using cross-filtering rules
            updateStagePlayer(0);   // Initialize with video 0
        });

        // Global jump handling function
function scrollToVideoPlayer() {
    const stage = document.getElementById('videoWrapperContainer');
    if(stage) {
        stage.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
}

// Intercept your existing updateStagePlayer function to refresh the title copy
const originalUpdateStagePlayer = updateStagePlayer;
updateStagePlayer = function(id) {
    originalUpdateStagePlayer(id);
    
    // Sync current active title to floating view display element
    const dataItem = playlistData.find(item => item.id === id);
    if(dataItem) {
        document.getElementById('floatingVideoTitle').innerText = dataItem.title;
    }
};

// Monitor the view layout scroll event loop
window.addEventListener('scroll', function() {
    const playerWrapper = document.getElementById('videoWrapperContainer');
    const floatingBar = document.getElementById('floatingStatusTracker');
    
    if(!playerWrapper || !floatingBar) return;
    
    // Check if the bottom edge of the player box has passed completely out of sight up top
    const playerBounds = playerWrapper.getBoundingClientRect();
    
    if (playerBounds.bottom < 0) {
        floatingBar.classList.add('visible');
    } else {
        floatingBar.classList.remove('visible');
    }
});
    </script>
</body>
</html>
