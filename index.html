<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InsuFlow | CI Pro Experience</title>
    
    <!-- Shared global navigation style link -->
    <link rel="stylesheet" href="global-nav.css">

    <style>
        /* Modern Apple Aesthetic Layout Styles */
        body {
            background-color: #f5f5f7;
            color: #1d1d1f;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .workspace-container {
            max-width: 940px;
            margin: 40px auto;
            padding: 0 24px 80px 24px;
        }

        /* Video Showcase Stage */
        .stage-card {
            background: #ffffff;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.04);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.02);
            margin-bottom: 32px;
        }

        .video-player-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            background-color: #000000;
        }

        .video-player-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .stage-info {
            padding: 28px 32px;
        }

        .stage-info h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.015em;
            margin-bottom: 6px;
            color: #1d1d1f;
        }

        .meta-strip {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .source-badge {
            display: inline-flex;
            align-items: center;
            font-size: 12px;
            font-weight: 500;
            color: #0071e3;
            background-color: #f5f5f7;
            padding: 4px 10px;
            border-radius: 6px;
        }

        .stage-info p {
            font-size: 15px;
            color: #515154;
            line-height: 1.6;
        }

        /* Apple Style Segmented Filter Tabs */
        .filter-navigation {
            margin-bottom: 20px;
        }

        .tab-scroll-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 8px;
            scrollbar-width: none; /* Hide for Firefox */
        }
        .tab-scroll-container::-webkit-scrollbar { display: none; } /* Hide for Chrome/Safari */

        .filter-tab {
            background: rgba(0, 0, 0, 0.04);
            border: none;
            color: #515154;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 500;
            border-radius: 999px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        .filter-tab:hover {
            background: rgba(0, 0, 0, 0.08);
            color: #000000;
        }

        .filter-tab.active {
            background: #1d1d1f;
            color: #ffffff;
        }

        /* Thumbnail Playlist Section */
        .playlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 16px;
        }

        .playlist-card {
            background: #ffffff;
            border: 1px solid rgba(0, 0, 0, 0.06);
            border-radius: 14px;
            padding: 20px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 6px;
            transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .playlist-card:hover {
            background-color: #f5f5f7;
            border-color: #d2d2d7;
            transform: translateY(-1px);
        }

        .playlist-card.active {
            background-color: #f5f5f7;
            border-color: #0071e3;
            box-shadow: inset 0 0 0 1px #0071e3;
        }

        .playlist-card .video-tag {
            font-size: 11px;
            font-weight: 600;
            color: #86868b;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .playlist-card h3 {
            font-size: 14px;
            font-weight: 600;
            color: #1d1d1f;
            line-height: 1.4;
            margin: 4px 0;
        }

        .playlist-card .card-source {
            font-size: 12px;
            color: #86868b;
            margin-top: auto;
            padding-top: 4px;
        }

        @media (max-width: 768px) {
            .stage-info { padding: 20px; }
            .stage-info h1 { font-size: 20px; }
            .workspace-container { padding: 0 16px 60px 16px; }
        }
    </style>
</head>
<body>

    <!-- Universal Top Navigation Row -->
    <header class="navbar">
        <div class="nav-container">
            <span class="logo" onclick="window.location.href='dashboard.html'">InsuFlow Hub</span>
            
            <div class="menu-toggle" onclick="toggleMobileMenu()">
                <span></span><span></span><span></span>
            </div>

            <nav class="nav-menu" id="navMenu">
                <a href="dashboard.html" class="nav-item">Operational Hub</a>
                <a href="ci-pro-experience.html" class="nav-item active">CI Pro Experience</a>
                <a href="app-filler.html" class="nav-item">1-to-3 Form Filler</a>
                <a href="app-nomination.html" class="nav-item">Nomination Tool</a>
            </nav>
        </div>
    </header>

    <!-- Workspace Content Layout Display Stage -->
    <main class="workspace-container">
        
        <div class="stage-card">
            <div class="video-player-wrapper" id="videoWrapperContainer">
                <!-- Video player maps dynamically here -->
            </div>
            
            <div class="stage-info">
                <div class="meta-strip">
                    <span id="videoSourceBadge" class="source-badge">Loading...</span>
                </div>
                <h1 id="videoTitle">Loading Session Title...</h1>
                <p id="videoDescription">Loading dynamic system explanation descriptions...</p>
            </div>
        </div>

        <!-- Segmented Category Filters -->
        <div class="filter-navigation">
            <div class="tab-scroll-container">
                <button class="filter-tab active" onclick="filterPlaylist('all')">All Modules</button>
                <button class="filter-tab" onclick="filterPlaylist('English - Survivor’s Stories')">EN: Survivor's Stories</button>
                <button class="filter-tab" onclick="filterPlaylist('English - Technology of Hope')">EN: Technology of Hope</button>
                <button class="filter-tab" onclick="filterPlaylist('English - Educational')">EN: Educational</button>
                <button class="filter-tab" onclick="filterPlaylist('Chinese - 疾病后的人生')">CN: 疾病后的人生</button>
            </div>
        </div>

        <!-- Filtered Grid -->
        <div class="playlist-grid" id="playlistItemsGrid"></div>

    </main>

    <script>
        function toggleMobileMenu() {
            document.getElementById('navMenu').classList.toggle('show');
        }

        // MASTER CATEGORIZED VIDEO DATA
        const playlistData = [
            {
                id: 0,
                title: "Millennials Fighting Stage 4 Cancer: How We Found Out | Part 1/3",
                description: "They’re under 45, fit, and thriving in their careers—until cancer turns their worlds upside down",
                category: "English - Survivor’s Stories",
                youtubeId: "Xwd-OdVXvx8"
            },
            {
                id: 1,
                title: "Millennials Fighting Stage 4 Cancer: Our New Life Goals | Part 2/3",
                description: "The three young patients need to adapt as the disease continues to shift their realities.",
                category: "English - Survivor’s Stories",
                youtubeId: "AOr9IKhkxac"
            },
            {
                id: 2,
                title: "Millennials Fighting Stage 4 Cancer: Will We Survive? | Part 3/3",
                description: "What does the future hold for these resilient young cancer patients? Can they overcome the odds and triumph over this relentless disease?",
                category: "English - Survivor’s Stories",
                youtubeId: "GvK6TYmFwjo",
                noCaptions: true // 🌟 Add this line to bypass caption checks
            },
            {
                id: 3,
                title: "3个90后患癌后如何面对的故事",
                description: "90后患淋巴癌隐瞒家人拍片全记录网上分享 | 29岁女患罕见癌症 | 23岁女确診乳癌",
                category: "Chinese - 疾病后的人生",
                youtubeId: "6hk3Cwfy94w"
            },
            {
                id: 4,
                title: "重获新生：理赔客户的真实告白",
                description: "深入探讨重大疾病给家庭财务带来的冲击，以及合理规划的境外保单如何为漫长的康复之路护航。",
                category: "English - Educational",
                youtubeId: "dQw4w9WgXcQ"
            }
        ];

        let currentActiveId = 0;
        let currentFilter = 'all';

        // Stage updater engine
        function updateStagePlayer(id) {
            currentActiveId = id;
            const dataItem = playlistData.find(item => item.id === id);
            const playerWrapper = document.getElementById('videoWrapperContainer');
            const cleanId = dataItem.youtubeId.toString().trim();

            playerWrapper.innerHTML = `
                <iframe 
                    src="https://www.youtube.com/embed/${cleanId}?rel=0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
                </iframe>
            `;
            
            document.getElementById('videoTitle').innerText = dataItem.title;
            document.getElementById('videoDescription').innerText = dataItem.description;
            document.getElementById('videoSourceBadge').innerText = dataItem.category;

            // Highlight chosen item card inside UI list
            document.querySelectorAll('.playlist-card').forEach(card => {
                if (parseInt(card.getAttribute('data-id')) === id) {
                    card.classList.add('active');
                } else {
                    card.classList.remove('active');
                }
            });
        }

        // Playlist filtering controller layout engine
        function filterPlaylist(categoryTag) {
            currentFilter = categoryTag;
            
            // Update Tab Button Styles
            const tabs = document.querySelectorAll('.filter-tab');
            tabs.forEach(tab => {
                if(tab.getAttribute('onclick').includes(`'${categoryTag}'`)) {
                    tab.classList.add('active');
                } else {
                    tab.classList.remove('active');
                }
            });

            // Rebuild Grid List Interface
            const listGrid = document.getElementById('playlistItemsGrid');
            listGrid.innerHTML = ''; 

            const filteredData = playlistData.filter(item => categoryTag === 'all' || item.category === categoryTag);

            filteredData.forEach((item) => {
                const cardElement = document.createElement('div');
                cardElement.className = `playlist-card ${item.id === currentActiveId ? 'active' : ''}`;
                cardElement.setAttribute('data-id', item.id);
                cardElement.setAttribute('onclick', `updateStagePlayer(${item.id})`);

                cardElement.innerHTML = `
                    <span class="video-tag">${item.category}</span>
                    <h3>${item.title}</h3>
                    <span class="card-source">📺 Click to View</span>
                `;
                listGrid.appendChild(cardElement);
            });

            // If the filtered array leaves out our currently selected main player video, automatically switch player to first available video in the view array
            if(filteredData.length > 0 && !filteredData.some(item => item.id === currentActiveId)) {
                updateStagePlayer(filteredData[0].id);
            }
        }

        // Initialize script logic processing 
        document.addEventListener("DOMContentLoaded", function() {
            filterPlaylist('all'); // Build grid
            updateStagePlayer(0);  // Initialize with video 0
        });
    </script>
</body>
</html>
