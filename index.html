<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InsuFlow | CI Pro Experience</title>
    
    <!-- 1. Load your shared global header styles -->
    <link rel="stylesheet" href="global-nav.css">

    <style>
        /* Modern Apple Aesthetic Layout Styles */
        body {
            background-color: #f5f5f7;
            color: #1d1d1f;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .workspace-container {
            max-width: 940px; /* Optimized layout width for focused video viewing */
            margin: 40px auto;
            padding: 0 24px 80px 24px;
        }

        /* Video Showcase Stage */
        .stage-card {
            background: #ffffff;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.04);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.02);
            margin-bottom: 24px;
        }

        .video-player-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* Golden 16:9 widescreen ratio */
            background-color: #000000;
        }

        .video-player-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .stage-info {
            padding: 28px 32px;
        }

        .stage-info h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.015em;
            margin-bottom: 6px;
            color: #1d1d1f;
        }

        /* Attribution Badges styling */
        .meta-strip {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .source-badge {
            display: inline-flex;
            align-items: center;
            font-size: 12px;
            font-weight: 500;
            color: #6e6e73;
            background-color: #f5f5f7;
            padding: 4px 10px;
            border-radius: 6px;
        }

        .stage-info p {
            font-size: 15px;
            color: #515154;
            line-height: 1.6;
        }

        /* Thumbnail Playlist Section */
        .playlist-section-title {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #86868b;
            margin-bottom: 14px;
            padding-left: 4px;
        }

        .playlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 16px;
        }

        .playlist-card {
            background: #ffffff;
            border: 1px solid rgba(0, 0, 0, 0.06);
            border-radius: 14px;
            padding: 20px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 6px;
            transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .playlist-card:hover {
            background-color: #f5f5f7;
            border-color: #d2d2d7;
            transform: translateY(-1px);
        }

        /* Premium active indicator ring */
        .playlist-card.active {
            background-color: #f5f5f7;
            border-color: #0071e3;
            box-shadow: inset 0 0 0 1px #0071e3;
        }

        .playlist-card .video-index {
            font-size: 11px;
            font-weight: 600;
            color: #0071e3;
            letter-spacing: 0.02em;
        }

        .playlist-card h3 {
            font-size: 14px;
            font-weight: 600;
            color: #1d1d1f;
            line-height: 1.4;
        }

        .playlist-card .card-source {
            font-size: 12px;
            color: #86868b;
            margin-top: auto;
            padding-top: 4px;
        }

        /* Responsive spacing fixes for smaller viewports */
        @media (max-width: 768px) {
            .stage-info { padding: 20px; }
            .stage-info h1 { font-size: 20px; }
            .workspace-container { padding: 0 16px 60px 16px; }
        }
    </style>
</head>
<body>

    <!-- 2. Sticky Universal Top Header Row -->
    <header class="navbar">
        <div class="nav-container">
            <span class="logo" onclick="window.location.href='dashboard.html'">InsuFlow Hub</span>
            
            <div class="menu-toggle" onclick="toggleMobileMenu()">
                <span></span><span></span><span></span>
            </div>

            <!-- Easily sync these link targets with your other web app pages -->
            <nav class="nav-menu" id="navMenu">
                <a href="dashboard.html" class="nav-item">Operational Hub</a>
                <a href="ci-pro-experience.html" class="nav-item active">CI Pro Experience</a>
                <a href="app-filler.html" class="nav-item">1-to-3 Form Filler</a>
                <a href="app-nomination.html" class="nav-item">Nomination Tool</a>
            </nav>
        </div>
    </header>

    <!-- 3. Primary Content Workspace -->
    <main class="workspace-container">
        
        <!-- The Main Focal Stage Card Component -->
        <div class="stage-card">
            <div class="video-player-wrapper">
                <iframe 
                    id="mainVideoPlayer"
                    src="" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
                </iframe>
            </div>
            <div class="stage-info">
                <div class="meta-strip">
                    <span id="videoSourceBadge" class="source-badge">Loading...</span>
                </div>
                <h1 id="videoTitle">Loading Session Title...</h1>
                <p id="videoDescription">Loading dynamic system explanation descriptions...</p>
            </div>
        </div>

        <!-- Horizontal/Grid Selector Playlist below -->
        <div class="playlist-section-title">Training Modules</div>
        <div class="playlist-grid" id="playlistItemsGrid"></div>

    </main>

    <!-- 4. Interactive Playlist Content Controller Engine -->
    <script>
        // MOBILE HAMBURGER MENU TOGGLE BUTTON LOGIC
        function toggleMobileMenu() {
            document.getElementById('navMenu').classList.toggle('show');
        }

        // MASTER DATA ARRAY DATABASE: Modify, add, or swap your video inventory parameters right here!
        const playlistData = [
            {
                title: "Understanding Critical Illness Core Concepts",
                description: "An operational walkthrough outlining definition structural adjustments, policy waiting period metrics, and primary claim validation steps required for client processing pipelines.",
                sourceType: "Channel",          // Can evaluate as "Channel" or "Country"
                sourceValue: "CI Pro Media",     // The text label display value
                youtubeId: "=r_wtiJ5N_ro"         // Swap this code with your custom YouTube URL ID string
            },
            {
                title: "Early Stage vs Advanced Stage Parameters",
                description: "A specialized contrast breakdown evaluating claim payout differences, tiered exception clauses, and cross-border underwriting benchmarks.",
                sourceType: "Country",
                sourceValue: "Malaysia Operations",
                youtubeId: "dQw4w9WgXcQ"
            },
            {
                title: "Offshore Portfolio Premium Protection Plans",
                description: "How structural wealth insurance policy choices protect business stability metrics and private family holdings during complex medical scenarios.",
                sourceType: "Country",
                sourceValue: "Labuan Offshore",
                youtubeId: "dQw4w9WgXcQ"
            }
        ];

        // Renders changes inside the main central video stage smoothly
        function updateStagePlayer(index) {
    const dataItem = playlistData[index];
    const playerWrapper = document.querySelector('.video-player-wrapper');
    
    // Check if the current item is our specific restricted video
    if (dataItem.youtubeId === "r_wtiJ5N_ro") {
        // Swap out the broken iframe with a beautiful Apple-style link stage
        playerWrapper.innerHTML = `
            <div style="position: absolute; top:0; left:0; width:100%; height:100%; background: #1c1c1e; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #ffffff; padding: 32px; text-align: center; font-family: -apple-system, BlinkMacSystemFont, sans-serif;">
                <div style="font-size: 40px; margin-bottom: 12px;">📺</div>
                <h2 style="font-size: 18px; font-weight: 600; margin-bottom: 8px; letter-spacing: -0.01em;">External Streaming Required</h2>
                <p style="font-size: 14px; color: #a1a1a6; max-width: 440px; margin-bottom: 24px; line-height: 1.5;">This specific training module has security controls that require it to be viewed directly on the native platform.</p>
                <a href="https://www.youtube.com/watch?v=${dataItem.youtubeId}" target="_blank" style="background: #0071e3; color: #ffffff; text-decoration: none; padding: 12px 26px; border-radius: 999px; font-size: 14px; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; box-shadow: 0 4px 12px rgba(0,113,227,0.3); transition: all 0.2s ease;">
                    Watch on YouTube 
                    <span style="font-size: 11px; opacity: 0.8;">↗</span>
                </a>
            </div>
        `;
    } else {
        // Render the flawless standard embedded iframe player for normal videos
        playerWrapper.innerHTML = `
            <iframe 
                id="mainVideoPlayer"
                src="https://www.youtube.com/embed/${dataItem.youtubeId}?rel=0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
            </iframe>
        `;
    }
    
    // Update text modules as usual
    document.getElementById('videoTitle').innerText = dataItem.title;
    document.getElementById('videoDescription').innerText = dataItem.description;
    
    const iconMarker = dataItem.sourceType.toLowerCase() === 'country' ? '🌐' : '📺';
    document.getElementById('videoSourceBadge').innerText = `${iconMarker} ${dataItem.sourceType}: ${dataItem.sourceValue}`;

    document.querySelectorAll('.playlist-card').forEach((card, currentIdx) => {
        if (currentIdx === index) {
            card.classList.add('active');
        } else {
            card.classList.remove('active');
        }
    });
}

        // Builds selection card grids automatically based on data array size 
        function generatePlaylistInterface() {
            const listGrid = document.getElementById('playlistItemsGrid');
            listGrid.innerHTML = ''; 

            playlistData.forEach((item, index) => {
                const cardElement = document.createElement('div');
                cardElement.className = `playlist-card ${index === 0 ? 'active' : ''}`;
                cardElement.setAttribute('onclick', `updateStagePlayer(${index})`);

                const iconMarker = item.sourceType.toLowerCase() === 'country' ? '🌐' : '📺';

                cardElement.innerHTML = `
                    <span class="video-index">MODULE 0${index + 1}</span>
                    <h3>${item.title}</h3>
                    <span class="card-source">${iconMarker} ${item.sourceValue}</span>
                `;
                listGrid.appendChild(cardElement);
            });

            // Initialize display properties using first inventory position configuration
            updateStagePlayer(0);
        }

        // Trigger compilation process instantly when layout elements build complete
        document.addEventListener("DOMContentLoaded", function() {
            generatePlaylistInterface();
        });
    </script>
</body>
</html>
