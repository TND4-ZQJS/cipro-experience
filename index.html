<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InsuFlow | CI Pro Experience</title>
    
    <!-- Shared global navigation style link -->
    <link rel="stylesheet" href="global-nav.css">

    <style>
        /* Modern Apple Aesthetic Layout Styles */
        body {
            background-color: #f5f5f7;
            color: #1d1d1f;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .workspace-container {
            max-width: 940px;
            margin: 40px auto;
            padding: 0 24px 80px 24px;
        }

        /* Video Showcase Stage */
        .stage-card {
            background: #ffffff;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.04);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.02);
            margin-bottom: 24px;
        }

        .video-player-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 widescreen ratio */
            background-color: #000000;
        }

        .video-player-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .stage-info {
            padding: 28px 32px;
        }

        .stage-info h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.015em;
            margin-bottom: 6px;
            color: #1d1d1f;
        }

        .meta-strip {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .source-badge {
            display: inline-flex;
            align-items: center;
            font-size: 12px;
            font-weight: 500;
            color: #6e6e73;
            background-color: #f5f5f7;
            padding: 4px 10px;
            border-radius: 6px;
        }

        .stage-info p {
            font-size: 15px;
            color: #515154;
            line-height: 1.6;
        }

        /* Thumbnail Playlist Section */
        .playlist-section-title {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #86868b;
            margin-bottom: 14px;
            padding-left: 4px;
        }

        .playlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 16px;
        }

        .playlist-card {
            background: #ffffff;
            border: 1px solid rgba(0, 0, 0, 0.06);
            border-radius: 14px;
            padding: 20px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 6px;
            transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .playlist-card:hover {
            background-color: #f5f5f7;
            border-color: #d2d2d7;
            transform: translateY(-1px);
        }

        .playlist-card.active {
            background-color: #f5f5f7;
            border-color: #0071e3;
            box-shadow: inset 0 0 0 1px #0071e3;
        }

        .playlist-card .video-index {
            font-size: 11px;
            font-weight: 600;
            color: #0071e3;
            letter-spacing: 0.02em;
        }

        .playlist-card h3 {
            font-size: 14px;
            font-weight: 600;
            color: #1d1d1f;
            line-height: 1.4;
        }

        .playlist-card .card-source {
            font-size: 12px;
            color: #86868b;
            margin-top: auto;
            padding-top: 4px;
        }

        @media (max-width: 768px) {
            .stage-info { padding: 20px; }
            .stage-info h1 { font-size: 20px; }
            .workspace-container { padding: 0 16px 60px 16px; }
        }
    </style>
</head>
<body>

    <!-- Universal Top Navigation Row -->
    <header class="navbar">
        <div class="nav-container">
            <span class="logo" onclick="window.location.href='dashboard.html'">InsuFlow Hub</span>
            
            <div class="menu-toggle" onclick="toggleMobileMenu()">
                <span></span><span></span><span></span>
            </div>

            <nav class="nav-menu" id="navMenu">
                <a href="dashboard.html" class="nav-item">Operational Hub</a>
                <a href="ci-pro-experience.html" class="nav-item active">CI Pro Experience</a>
                <a href="app-filler.html" class="nav-item">1-to-3 Form Filler</a>
                <a href="app-nomination.html" class="nav-item">Nomination Tool</a>
            </nav>
        </div>
    </header>

    <!-- Workspace Content Layout Display Stage -->
    <main class="workspace-container">
        
        <div class="stage-card">
            <!-- This container updates dynamically via JavaScript -->
            <div class="video-player-wrapper" id="videoWrapperContainer">
                <!-- Fallback framework will override this cleanly -->
            </div>
            
            <div class="stage-info">
                <div class="meta-strip">
                    <span id="videoSourceBadge" class="source-badge">Loading...</span>
                </div>
                <h1 id="videoTitle">Loading Session Title...</h1>
                <p id="videoDescription">Loading dynamic system explanation descriptions...</p>
            </div>
        </div>

        <div class="playlist-section-title">Training Modules</div>
        <div class="playlist-grid" id="playlistItemsGrid"></div>

    </main>

    <!-- Interactive Workspace Control Logic -->
    <script>
        function toggleMobileMenu() {
            document.getElementById('navMenu').classList.toggle('show');
        }

        // VIDEO DATA INVENTORY LIST
        const playlistData = [
            {
                title: "Understanding Critical Illness Core Concepts",
                description: "An operational walkthrough outlining definition structural adjustments, policy waiting period metrics, and primary claim validation steps required for client processing pipelines.",
                sourceType: "Channel",
                sourceValue: "CI Pro Media",
                youtubeId: "r_wtiJ5N_ro" // <-- The exact protected YouTube URL target ID
            },
            {
                title: "Early Stage vs Advanced Stage Parameters",
                description: "A specialized contrast breakdown evaluating claim payout differences, tiered exception clauses, and cross-border underwriting benchmarks.",
                sourceType: "Country",
                sourceValue: "Malaysia Operations",
                youtubeId: "dQw4w9WgXcQ" // Standard test ID (Unblocked)
            },
            {
                title: "Offshore Portfolio Premium Protection Plans",
                description: "How structural wealth insurance policy choices protect business stability metrics and private family holdings during complex medical scenarios.",
                sourceType: "Country",
                sourceValue: "Labuan Offshore",
                youtubeId: "dQw4w9WgXcQ" // Standard test ID (Unblocked)
            }
        ];

        // Central state switcher logic engine
        function updateStagePlayer(index) {
            const dataItem = playlistData[index];
            const playerWrapper = document.getElementById('videoWrapperContainer');
            
            // Clean dynamic parameter ID safety formatting check
            const cleanId = dataItem.youtubeId.toString().trim().replace('watch?v=', '');

            // SYSTEM CHECK: If the video ID matches the blocked video, drop fallback display card instead
            if (cleanId === "r_wtiJ5N_ro") {
                playerWrapper.innerHTML = `
                    <div style="position: absolute; top:0; left:0; width:100%; height:100%; background: #1c1c1e; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #ffffff; padding: 32px; text-align: center; font-family: -apple-system, BlinkMacSystemFont, sans-serif;">
                        <div style="font-size: 40px; margin-bottom: 12px;">📺</div>
                        <h2 style="font-size: 18px; font-weight: 600; margin-bottom: 8px; letter-spacing: -0.01em;">External Streaming Required</h2>
                        <p style="font-size: 14px; color: #a1a1a6; max-width: 440px; margin-bottom: 24px; line-height: 1.5;">This specific training module has security controls that require it to be viewed directly on the native platform.</p>
                        <a href="https://www.youtube.com/watch?v=${cleanId}" target="_blank" style="background: #0071e3; color: #ffffff; text-decoration: none; padding: 12px 26px; border-radius: 999px; font-size: 14px; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; box-shadow: 0 4px 12px rgba(0,113,227,0.3); transition: all 0.2s ease;">
                            Watch on YouTube 
                            <span style="font-size: 11px; opacity: 0.8;">↗</span>
                        </a>
                    </div>
                `;
            } else {
                // Otherwise render the stable, interactive standard YouTube player element
                playerWrapper.innerHTML = `
                    <iframe 
                        src="https://www.youtube.com/embed/${cleanId}?rel=0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen>
                    </iframe>
                `;
            }
            
            // Sync content detail cards strings blocks
            document.getElementById('videoTitle').innerText = dataItem.title;
            document.getElementById('videoDescription').innerText = dataItem.description;
            
            const iconMarker = dataItem.sourceType.toLowerCase() === 'country' ? '🌐' : '📺';
            document.getElementById('videoSourceBadge').innerText = `${iconMarker} ${dataItem.sourceType}: ${dataItem.sourceValue}`;

            // Sync structural selection active highlights
            document.querySelectorAll('.playlist-card').forEach((card, currentIdx) => {
                if (currentIdx === index) {
                    card.classList.add('active');
                } else {
                    card.classList.remove('active');
                }
            });
        }

        // Builds selection card lists dynamically
        function generatePlaylistInterface() {
            const listGrid = document.getElementById('playlistItemsGrid');
            listGrid.innerHTML = ''; 

            playlistData.forEach((item, index) => {
                const cardElement = document.createElement('div');
                cardElement.className = `playlist-card ${index === 0 ? 'active' : ''}`;
                cardElement.setAttribute('onclick', `updateStagePlayer(${index})`);

                const iconMarker = item.sourceType.toLowerCase() === 'country' ? '🌐' : '📺';

                cardElement.innerHTML = `
                    <span class="video-index">MODULE 0${index + 1}</span>
                    <h3>${item.title}</h3>
                    <span class="card-source">${iconMarker} ${item.sourceValue}</span>
                `;
                listGrid.appendChild(cardElement);
            });

            // Initialize structural configuration targeting position 0 using our secure function
            updateStagePlayer(0);
        }

        // Process compilation when browser page building resolves
        document.addEventListener("DOMContentLoaded", function() {
            generatePlaylistInterface();
        });
    </script>
</body>
</html>
